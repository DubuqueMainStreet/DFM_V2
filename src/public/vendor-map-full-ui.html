        // ==================== RENDERING ====================
        // Convert a GeoJSON feature (Point or Polygon) to a [lat, lng] anchor
        // used for Leaflet markers. For Polygons, computes the centroid of the
        // outer ring instead of picking the first vertex.
        function featureToLatLng(feature) {
            if (!feature || !feature.geometry) return null;
            const g = feature.geometry;
            if (g.type === 'Point' && Array.isArray(g.coordinates)) {
                const [lng, lat] = g.coordinates;
                return (typeof lat === 'number' && typeof lng === 'number') ? [lat, lng] : null;
            }
            if (g.type === 'Polygon' && Array.isArray(g.coordinates) && Array.isArray(g.coordinates[0])) {
                const ring = g.coordinates[0];
                if (ring.length === 0) return null;
                // Drop closing vertex if present (GeoJSON polygons close on themselves).
                const pts = (ring[0] && ring.length > 1 && ring[0][0] === ring[ring.length - 1][0] && ring[0][1] === ring[ring.length - 1][1])
                    ? ring.slice(0, -1)
                    : ring;
                let sumLat = 0, sumLng = 0, n = 0;
                for (const p of pts) {
                    if (p && typeof p[0] === 'number' && typeof p[1] === 'number') {
                        sumLng += p[0];
                        sumLat += p[1];
                        n++;
                    }
                }
                return n > 0 ? [sumLat / n, sumLng / n] : null;
            }
            return null;
        }

        function renderMap() {

            // Clear layers and focus state
            focusedMarker = null;
            lastMapBounds = null;
            const fitBtnEl = document.getElementById('fit-market-btn');
            if (fitBtnEl) fitBtnEl.style.display = 'none';

            stallLayerGroup.clearLayers();
            poiLayerGroup.clearLayers();
            vendorLayerGroup.clearLayers();
            vendorMarkerRefs = {};
            vendorPopupOrder = [];
            poiMarkerRefs = {};
            stallIdToFeatureMap.clear();

            const bounds = [];
            const stallsWithVendors = new Set();

            // Collect stall IDs with vendors
            vendorsOnDate.forEach(v => {
                (v.StallList || []).forEach(id => stallsWithVendors.add(id.trim().toUpperCase()));
            });

            // Render stalls
            (allStallLayouts || []).forEach(stall => {
                try {
                    const key = (stall.title || "").trim().toUpperCase();
                    if (!key || !stall.geoJsonFeature) return;

                    const feature = JSON.parse(stall.geoJsonFeature);
                    stallIdToFeatureMap.set(key, feature);

                    // For Point geometry: only render an empty-stall marker (no L.geoJSON default pin).
                    // For Polygon geometry: render the outline shape.
                    if (feature.geometry?.type === "Polygon") {
                        L.geoJSON(feature, {
                            style: { fillColor: "#d4c4a0", weight: 1, opacity: 0.3, color: '#b8a88a', fillOpacity: 0.1 },
                            interactive: false
                        }).addTo(stallLayerGroup);
                    }

                    // Empty stall marker (only for stalls without a vendor)
                    if (!stallsWithVendors.has(key) && feature.geometry?.coordinates) {
                        const latlng = featureToLatLng(feature);
                        if (!latlng) return;
                        const marker = L.marker(latlng, {
                            icon: createEmptyStallIcon(key),
                            zIndexOffset: 0
                        });
                        marker.bindPopup(`<div class="popup-header"><div class="popup-title">Stall ${escapeHtml(key)}</div><div class="popup-subtitle">Available</div></div>`);
                        marker.addTo(stallLayerGroup);
                        bounds.push(latlng);
                    }
                } catch (e) {
                    console.error("Error rendering stall:", e);
                }
            });

            // Render POIs — use L.marker for Points (avoid L.geoJSON default blue pins)
            (allPois || []).forEach(poi => {
                try {
                    const feature = JSON.parse(poi.geoJsonFeature);
                    const props = { ...feature.properties, poiType: poi.poiType, title: poi.title, description: poi.description };

                    if (feature.geometry?.type === "Point") {
                        const latlng = featureToLatLng(feature);
                        if (!latlng) return;
                        const marker = L.marker(latlng, { icon: createPoiIcon(props) });
                        marker.bindPopup(buildPoiPopup(props));
                        marker.on('popupopen', () => {
                            focusedMarker = marker;
                            updateMarkerStyles();
                        });
                        marker.on('popupclose', () => {
                            focusedMarker = null;
                            updateMarkerStyles();
                        });
                        marker.addTo(poiLayerGroup);
                        poiMarkerRefs[poi.title] = { marker, props };
                        bounds.push(latlng);
                    } else if (feature.geometry?.type === "Polygon") {
                        const layer = L.geoJSON(feature, {
                            style: { fillColor: getPOIColor(poi.poiType), weight: 2, opacity: 0.6, fillOpacity: 0.2 }
                        });
                        layer.bindPopup(buildPoiPopup(props));
                        layer.addTo(poiLayerGroup);
                    }
                } catch (e) {
                    console.error("Error rendering POI:", e);
                }
            });

            // Render vendors
            vendorsOnDate.forEach(vendor => {
                if (!vendor.StallList?.length) return;

                const stallBlocks = groupContiguousStalls(vendor.StallList);
                stallBlocks.forEach(block => {
                    const features = block.map(id => stallIdToFeatureMap.get(id.trim().toUpperCase())).filter(f => f?.geometry);
                    if (!features.length) return;

                    let latlng;
                    if (features.length > 1) {
                        const coords = features.map(f => featureToLatLng(f)).filter(Boolean);
                        latlng = coords.length ? L.latLngBounds(coords).getCenter() : null;
                    } else {
                        latlng = featureToLatLng(features[0]);
                    }
                    if (!latlng) return;

                    const marker = L.marker(latlng, {
                        icon: createVendorIcon(vendor),
                        zIndexOffset: 100
                    });
                    marker.bindPopup(buildVendorPopup(vendor, block), {
                        autoPan: true,
                        autoPanPadding: window.matchMedia('(max-width: 480px)').matches ? [40, 60] : [40, 40],
                        autoPanSpeed: 12
                    });
                    marker.on('popupopen', () => {
                        focusedMarker = marker;
                        updateMarkerStyles();
                        const targetZoom = Math.max(map.getZoom(), 18);
                        const targetLatLng = Array.isArray(latlng) ? L.latLng(latlng[0], latlng[1]) : latlng;
                        const needsMove = map.getZoom() < targetZoom || !map.getBounds().pad(-0.2).contains(targetLatLng);
                        if (!needsMove) return;

                        if (prefersReducedMotion()) {
                            if (map.getZoom() < targetZoom) {
                                map.setView(latlng, targetZoom, { animate: false });
                            } else {
                                map.panTo(latlng, { animate: false });
                            }
                            return;
                        }

                        if (map.getZoom() < targetZoom) {
                            map.setView(latlng, targetZoom, { animate: true, duration: 0.35 });
                        } else {
                            map.panTo(latlng, { animate: true, duration: 0.3 });
                        }
                    });
                    marker.on('popupclose', () => {
                        focusedMarker = null;
                        updateMarkerStyles();
                    });
                    marker.addTo(vendorLayerGroup);
                    vendorMarkerRefs[vendor.title] = { marker, data: vendor, stallBlock: block };
                    vendorPopupOrder.push({ marker, vendor, block });
                    bounds.push(Array.isArray(latlng) ? latlng : [latlng.lat, latlng.lng]);
                });
            });

            // Store bounds for "Fit market" button
            if (bounds.length > 0) {
                lastMapBounds = L.latLngBounds(bounds).pad(0.1);
                if (fitBtnEl) fitBtnEl.style.display = 'flex';
            }

            // Fit bounds on first load
            if (!initialZoomDone && bounds.length > 0) {
                map.fitBounds(lastMapBounds);
                initialZoomDone = true;
            }

            // Update vendor count
            vendorCountEl.textContent = vendorsOnDate.length;

            // Show message if no vendors
            if (vendorsOnDate.length === 0 && selectedDate) {
                showMessage("No vendors scheduled for this date");
            } else {
                hideMessage();
            }
        }

        // ==================== ICON CREATION ====================
        function createVendorIcon(vendor, highlighted = false, dimmed = false) {
            const bg = VENDOR_TYPE_COLORS[vendor.vendorType] || VENDOR_TYPE_COLORS.Default;
            const fa = determineVendorIcon(vendor);
            const size = 36;
            const extraClass = highlighted ? ' highlighted' : (dimmed ? ' dimmed' : '');

            return L.divIcon({
                className: 'vendor-marker' + extraClass,
                html: `<div class="marker-pin" style="width:${size}px;height:${size}px;background:${bg}"><i class="fa-solid ${fa}" style="font-size:14px"></i></div>`,
                iconSize: [44, 44],
                iconAnchor: [22, 22],
                popupAnchor: [0, -22]
            });
        }

        function createEmptyStallIcon(stallId) {
            const size = 24;
            return L.divIcon({
                className: 'vendor-marker empty-stall-marker',
                html: `<div class="marker-pin" style="width:${size}px;height:${size}px;background:#9a9a9a;font-size:9px;color:#fff;font-weight:600">${escapeHtml(stallId)}</div>`,
                iconSize: [size, size],
                iconAnchor: [size / 2, size / 2],
                popupAnchor: [0, -(size / 2) - 4]
            });
        }

        function createPoiIcon(props, highlighted = false, dimmed = false) {
            const config = POI_CONFIG[props.poiType] || POI_CONFIG.Default;
            const size = 30;
            const extraClass = highlighted ? ' highlighted' : (dimmed ? ' dimmed' : '');

            return L.divIcon({
                className: 'vendor-marker' + extraClass,
                html: `<div class="marker-pin" style="width:${size}px;height:${size}px;background:${config.color}"><i class="fa-solid ${config.icon}" style="font-size:12px"></i></div>`,
                iconSize: [size, size],
                iconAnchor: [size / 2, size / 2],
                popupAnchor: [0, -(size / 2) - 4]
            });
        }

        function escapeRegExp(text) {
            return String(text).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        }

        function containsKeyword(haystack, keywordObj) {
            const kw = keywordObj.keyword;
            if (!kw) return false;

            if (keywordObj.phrase) {
                return haystack.includes(kw);
            }

            return keywordObj.regex ? keywordObj.regex.test(haystack) : false;
        }

        function determineVendorIcon(vendor) {
            const text = [
                vendor.title || "",
                vendor.description || "",
                vendor.arraystring || ""
            ].join(" ").toLowerCase();

            let bestIcon = null;
            let bestScore = 0;
            let bestRule = null;
            let bestMatchedKeywords = [];

            for (const rule of PRECOMPILED_VENDOR_ICON_RULES) {
                const matchedKeywords = [];
                for (const keywordObj of rule.compiledKeywords) {
                    if (containsKeyword(text, keywordObj)) matchedKeywords.push(keywordObj.keyword);
                }

                const matchCount = matchedKeywords.length;
                if (matchCount > 0) {
                    const score = rule.priority + (matchCount * 5);
                    if (score > bestScore) {
                        bestScore = score;
                        bestIcon = rule.faClass;
                        bestRule = rule;
                        bestMatchedKeywords = matchedKeywords;
                    }
                }
            }

            const selectedIcon = bestIcon
                || VENDOR_TYPE_FALLBACK_ICONS[vendor.vendorType]
                || VENDOR_ICON_CONFIG.defaultVendor.faClass;

            if (ICON_DEBUG_ENABLED) {
                const vendorKey = `${vendor._id || vendor.title || "unknown"}|${selectedIcon}`;
                if (!iconDebugLogCache.has(vendorKey)) {
                    iconDebugLogCache.add(vendorKey);
                    const reason = bestRule
                        ? {
                            mode: "keyword-rule",
                            priority: bestRule.priority,
                            matchedKeywords: bestMatchedKeywords,
                            score: bestScore
                        }
                        : {
                            mode: VENDOR_TYPE_FALLBACK_ICONS[vendor.vendorType] ? "vendorType-fallback" : "default-fallback",
                            vendorType: vendor.vendorType || null
                        };

                    console.info("[DFM Icon Debug]", {
                        vendor: vendor.title || "(untitled vendor)",
                        vendorId: vendor._id || null,
                        selectedIcon,
                        reason,
                        sourceText: {
                            title: vendor.title || "",
                            description: vendor.description || "",
                            tags: vendor.arraystring || ""
                        }
                    });
                }
            }

            if (!bestIcon) {
                return selectedIcon;
            }

            return bestIcon;
        }

        function getPOIColor(poiType) {
            return (POI_CONFIG[poiType] || POI_CONFIG.Default).color;
        }

        function getContrastTextColor(colorValue) {
            const rgb = parseColorToRgb(colorValue);
            if (!rgb) return '#ffffff';
            const r = rgb.r / 255;
            const g = rgb.g / 255;
            const b = rgb.b / 255;
            const luminance = 0.2126 * r + 0.7152 * g + 0.0722 * b;
            return luminance > 0.45 ? '#1a1a1a' : '#ffffff';
        }

        function parseColorToRgb(colorValue) {
            if (!colorValue) return null;
            const value = colorValue.trim();
            if (value.startsWith('#')) {
                return hexToRgb(value);
            }
            if (value.startsWith('rgb')) {
                const match = value.match(/rgba?\(([^)]+)\)/i);
                if (!match) return null;
                const parts = match[1].split(',').map(part => parseFloat(part.trim()));
                if (parts.length < 3) return null;
                return { r: parts[0], g: parts[1], b: parts[2] };
            }
            return null;
        }

        function hexToRgb(hexValue) {
            const hex = hexValue.replace('#', '');
            if (hex.length === 3) {
                return {
                    r: parseInt(hex[0] + hex[0], 16),
                    g: parseInt(hex[1] + hex[1], 16),
                    b: parseInt(hex[2] + hex[2], 16)
                };
            }
            if (hex.length === 6) {
                return {
                    r: parseInt(hex.slice(0, 2), 16),
                    g: parseInt(hex.slice(2, 4), 16),
                    b: parseInt(hex.slice(4, 6), 16)
                };
            }
            return null;
        }

        // ==================== POPUPS ====================
        // Escape every dynamic string that goes into a popup template literal.
        // Vendor and POI fields originate from CMS rows authored in Wix; even
        // though those are admin-only today, treating them as untrusted is the
        // defensive default. Returns '' for null/undefined to keep templates tidy.
        const HTML_ESCAPE_MAP = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;', '/': '&#x2F;' };
        function escapeHtml(value) {
            if (value === null || value === undefined) return '';
            return String(value).replace(/[&<>"'/]/g, ch => HTML_ESCAPE_MAP[ch]);
        }
        // Attribute-safe URL check: only allow http(s):// and mailto: / tel:
        // schemes. Returns an escaped href or '#'.
        function safeHref(raw) {
            if (!raw) return '#';
            const str = String(raw).trim();
            const normalized = /^https?:\/\//i.test(str) ? str
                : (/^(mailto:|tel:)/i.test(str) ? str : 'https://' + str);
            if (!/^(https?:\/\/|mailto:|tel:)/i.test(normalized)) return '#';
            return escapeHtml(normalized);
        }

        function buildVendorPopup(vendor, stalls) {
            const color = VENDOR_TYPE_COLORS[vendor.vendorType] || '#3EB449';
            const textColor = getContrastTextColor(color);
            const title = escapeHtml(vendor.title);
            const vendorType = escapeHtml(vendor.vendorType || 'Vendor');
            const stallsLabel = stalls.map(escapeHtml).join(', ');
            let html = `<div class="popup-header" data-header-color="${color}" style="background:${color};color:${textColor}">
                <div class="popup-title">${title}</div>
                <div class="popup-subtitle">${vendorType} • Stalls: ${stallsLabel}</div>
            </div>`;

            html += '<div class="popup-body">';
            if (vendor.description) {
                html += `<p class="popup-description">${escapeHtml(vendor.description)}</p>`;
            }
            if (vendor.arraystring) {
                html += `<div class="popup-tags" style="--tag-accent:${color}">`;
                vendor.arraystring.split(/[,;]/).slice(0, 5).forEach(tag => {
                    const trimmed = tag.trim();
                    if (trimmed) html += `<span class="popup-tag">${escapeHtml(trimmed)}</span>`;
                });
                html += '</div>';
            }
            html += '</div>';

            html += '<div class="popup-actions">';
            if (vendor.url) {
                html += `<a href="${safeHref(vendor.url)}" target="_blank" rel="noopener noreferrer" class="popup-btn popup-btn-secondary"><i class="fa-solid fa-globe"></i> Website</a>`;
            }
            const directionsHref = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent((vendor.title || '') + ' Dubuque Farmers Market')}`;
            html += `<a href="${escapeHtml(directionsHref)}" target="_blank" rel="noopener noreferrer" class="popup-btn popup-btn-primary"><i class="fa-solid fa-location-arrow"></i> Directions</a>`;
            html += '</div>';
            html += '<div class="popup-nav" role="navigation" aria-label="Browse vendors"></div>';

            return html;
        }

        function buildPoiPopup(props) {
            const config = POI_CONFIG[props.poiType] || POI_CONFIG.Default;
            const textColor = getContrastTextColor(config.color);
            const title = escapeHtml(props.title || 'Point of Interest');
            const poiType = escapeHtml(props.poiType || '');
            const description = escapeHtml(props.description || '');
            return `<div class="popup-header" data-header-color="${config.color}" style="background:${config.color};color:${textColor}">
                <div class="popup-title">${title}</div>
                <div class="popup-subtitle">${poiType}</div>
            </div>
            <div class="popup-body">
                <p class="popup-description">${description}</p>
            </div>`;
        }

        // ==================== FILTERING ====================
        function itemMatchesFilter(item, type) {
            if (!currentFilter && !searchTerm) return true;

            if (searchTerm) {
                const text = type === 'vendor' 
                    ? [item.title, item.description, item.vendorType, item.arraystring].join(' ').toLowerCase()
                    : [item.title, item.description, item.poiType].join(' ').toLowerCase();
                return text.includes(searchTerm);
            }

            if (currentFilter) {
                if (type === 'vendor') {
                    if (currentFilter.type === 'vendorType') return item.vendorType === currentFilter.value;
                    if (currentFilter.type === 'keyword') {
                        const text = [item.title, item.description, item.arraystring].join(' ').toLowerCase();
                        return currentFilter.value.split(' ').some(kw => text.includes(kw));
                    }
                }
                if (type === 'poi') {
                    if (currentFilter.type === 'poiType') {
                        return (item.poiType || '').toLowerCase().includes(currentFilter.value.toLowerCase());
                    }
                }
            }

            return false;
        }

        let _markerStyleRAF = null;
        function updateMarkerStyles() {
            if (_markerStyleRAF) cancelAnimationFrame(_markerStyleRAF);
            _markerStyleRAF = requestAnimationFrame(_applyMarkerStyles);
        }

        function _applyMarkerStyles() {
            _markerStyleRAF = null;
            const hasFilter = currentFilter || searchTerm;
            const hasFocus = !!focusedMarker;

            Object.values(vendorMarkerRefs).forEach(ref => {
                const matches = itemMatchesFilter(ref.data, 'vendor');
                const highlighted = (hasFilter && matches) || (hasFocus && ref.marker === focusedMarker);
                const dimmed = (hasFilter && !matches) || (hasFocus && ref.marker !== focusedMarker);
                ref.marker.setIcon(createVendorIcon(ref.data, highlighted, dimmed));
                ref.marker.setZIndexOffset(dimmed ? 0 : (highlighted ? 200 : 100));
            });

            Object.values(poiMarkerRefs).forEach(ref => {
                if (!ref.marker.setIcon) return;
                const matches = itemMatchesFilter(ref.props, 'poi');
                const highlighted = (hasFilter && matches) || (hasFocus && ref.marker === focusedMarker);
                const dimmed = (hasFilter && !matches) || (hasFocus && ref.marker !== focusedMarker);
                ref.marker.setIcon(createPoiIcon(ref.props, highlighted, dimmed));
            });

            // Fly to matching results when filtering; show "no results" when nothing matches.
            if (hasFilter && !hasFocus) {
                const matchingLatLngs = [];
                for (const ref of Object.values(vendorMarkerRefs)) {
                    if (itemMatchesFilter(ref.data, 'vendor') && ref.marker.getLatLng) {
                        matchingLatLngs.push(ref.marker.getLatLng());
                    }
                }
                for (const ref of Object.values(poiMarkerRefs)) {
                    if (ref.marker.getLatLng && itemMatchesFilter(ref.props, 'poi')) {
                        matchingLatLngs.push(ref.marker.getLatLng());
                    }
                }

                if (matchingLatLngs.length > 0) {
                    hideMessage();

                    const matchBounds = L.latLngBounds(matchingLatLngs);
                    const allVisible = map.getBounds().contains(matchBounds);
                    if (!allVisible) {
                        const maxZoom = Math.min(map.getZoom() + 1, 18);
                        const fitOptions = {
                            padding: [32, 32],
                            maxZoom
                        };
                        const flyDuration = prefersReducedMotion() ? 0 : 0.4;
                        if (flyDuration === 0) {
                            map.fitBounds(matchBounds, fitOptions);
                        } else {
                            requestAnimationFrame(() => {
                                map.flyToBounds(matchBounds, { ...fitOptions, duration: flyDuration });
                            });
                        }
                    }
                } else {
                    showNoResultsMessage();
                }
            } else if (!hasFilter) {
                hideMessage();
            }
        }

        function clearFilters() {
            currentFilter = null;
            searchTerm = '';
            searchInput.value = '';
            clearFilterButtons();
            updateSearchContainerState();
            hideMessage();
            updateMarkerStyles();
            updateActiveFilterChip();
        }

        function clearFilterButtons() {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        }

        function updateFilterScrollState(scroller) {
            if (!scroller) return;
            const maxScrollLeft = scroller.scrollWidth - scroller.clientWidth;
            scroller.classList.toggle('scrolled-left', scroller.scrollLeft > 8);
            scroller.classList.toggle('scrolled-right', (maxScrollLeft - scroller.scrollLeft) > 8);
        }

        function updateSearchContainerState() {
            if (searchInput.value) {
                searchContainer.classList.add('has-value');
            } else {
                searchContainer.classList.remove('has-value');
            }
        }

        function updateActiveFilterChip() {
            const chip = document.getElementById('active-filter-chip');
            const label = document.getElementById('active-filter-label');
            if (!chip || !label) return;

            if (currentFilter) {
                const activeBtn = document.querySelector('.filter-btn.active');
                const text = activeBtn ? activeBtn.textContent.trim().replace(/\s+/g, ' ') : 'Filtered';
                label.textContent = text;
                chip.classList.add('visible');
            } else if (searchTerm) {
                label.textContent = 'Search: "' + searchTerm + '"';
                chip.classList.add('visible');
            } else {
                chip.classList.remove('visible');
            }
        }

        // ==================== UTILITIES ====================
        function groupContiguousStalls(list) {
            if (!list || !list.length) return [];
            const sorted = [...list].sort((a, b) => {
                const matchA = a.match(/([A-Z]*)(\d+)/i);
                const matchB = b.match(/([A-Z]*)(\d+)/i);
                if (matchA && matchB) {
                    if (matchA[1] !== matchB[1]) return matchA[1].localeCompare(matchB[1]);
                    return parseInt(matchA[2]) - parseInt(matchB[2]);
                }
                return a.localeCompare(b);
            });

            const groups = [[sorted[0]]];
            for (let i = 1; i < sorted.length; i++) {
                const prev = sorted[i - 1].match(/([A-Z]*)(\d+)/i);
                const curr = sorted[i].match(/([A-Z]*)(\d+)/i);
                if (prev && curr && prev[1] === curr[1] && parseInt(curr[2]) - parseInt(prev[2]) === 1) {
                    groups[groups.length - 1].push(sorted[i]);
                } else {
                    groups.push([sorted[i]]);
                }
            }
            return groups;
        }

        function showLoader() {
            mapLoader.classList.remove('hidden');
        }

        function hideLoader() {
            mapLoader.classList.add('hidden');
        }

        function showMessage(text) {
            mapMessage.textContent = text;
            mapMessage.classList.add('visible');
        }

        function showNoResultsMessage() {
            mapMessage.innerHTML = 'No vendors or places match. <button type="button" class="msg-clear-filters">Clear filters</button>';
            mapMessage.classList.add('visible');
        }

        function hideMessage() {
            mapMessage.textContent = '';
            mapMessage.classList.remove('visible');
        }

        // ==================== GEOLOCATION ====================
        // When embedded in Wix, the iframe cannot use navigator.geolocation (Permissions Policy).
        // The parent page requests location and sends the result via postMessage.
        let locationRequestTimeoutId = null;
        // Cap accuracy circle so it stays useful at market scale (a few blocks). Device may report 100m+.
        const MAX_ACCURACY_RADIUS_M = 45;

        function clampAccuracyRadius(meters) {
            const m = typeof meters === 'number' && meters > 0 ? meters : 50;
            return Math.min(m, MAX_ACCURACY_RADIUS_M);
        }

        function applyLocationFromParent(payload) {
            const btn = document.getElementById('locate-btn');
            if (!btn || !payload || typeof payload.latitude !== 'number' || typeof payload.longitude !== 'number') return;
            if (locationRequestTimeoutId) {
                clearTimeout(locationRequestTimeoutId);
                locationRequestTimeoutId = null;
            }
            btn.classList.remove('locating');
            btn.classList.add('active');
            const latlng = [payload.latitude, payload.longitude];
            const accuracy = clampAccuracyRadius(payload.accuracy);

            if (!userLocationMarker) {
                userLocationMarker = L.marker(latlng, {
                    icon: L.divIcon({
                        className: 'user-location-marker',
                        iconSize: [16, 16],
                        iconAnchor: [8, 8]
                    }),
                    zIndexOffset: 1000
                }).addTo(map).bindPopup("You are here");
                userAccuracyCircle = L.circle(latlng, {
                    radius: accuracy,
                    className: 'user-accuracy-circle',
                    interactive: false
                }).addTo(map);
                map.flyTo(latlng, Math.max(map.getZoom(), 17));
            } else {
                userLocationMarker.setLatLng(latlng).setOpacity(1);
                userAccuracyCircle.setLatLng(latlng).setRadius(accuracy);
            }
        }

        function onLocationErrorFromParent(payload) {
            const btn = document.getElementById('locate-btn');
            if (locationRequestTimeoutId) {
                clearTimeout(locationRequestTimeoutId);
                locationRequestTimeoutId = null;
            }
            if (btn) btn.classList.remove('locating', 'active');
            showMessage(payload && payload.message ? payload.message : "Could not get location");
            setTimeout(hideMessage, 3000);
        }

        function toggleGeolocation() {
            const btn = document.getElementById('locate-btn');

            if (geoWatchId) {
                navigator.geolocation.clearWatch(geoWatchId);
                geoWatchId = null;
                btn.classList.remove('locating', 'active');
                if (userLocationMarker) userLocationMarker.setOpacity(0.5);
                return;
            }

            // When embedded (e.g. in Wix), parent requests location; iframe cannot use geolocation.
            if (window.parent && window.parent !== window) {
                if (userLocationMarker && btn.classList.contains('active')) {
                    btn.classList.remove('active');
                    userLocationMarker.setOpacity(0.5);
                    return;
                }
                sendToParent({ type: "requestLocation" });
                btn.classList.add('locating');
                locationRequestTimeoutId = setTimeout(() => {
                    locationRequestTimeoutId = null;
                    btn.classList.remove('locating');
                    showMessage("Could not get location");
                    setTimeout(hideMessage, 3000);
                }, 15000);
                return;
            }

            if (!navigator.geolocation) {
                showMessage("Geolocation not supported");
                return;
            }

            btn.classList.add('locating');

            geoWatchId = navigator.geolocation.watchPosition(
                (pos) => {
                    btn.classList.remove('locating');
                    btn.classList.add('active');
                    const { latitude, longitude, accuracy } = pos.coords;
                    const latlng = [latitude, longitude];
                    const radius = clampAccuracyRadius(accuracy);

                    if (!userLocationMarker) {
                        userLocationMarker = L.marker(latlng, {
                            icon: L.divIcon({
                                className: 'user-location-marker',
                                iconSize: [16, 16],
                                iconAnchor: [8, 8]
                            }),
                            zIndexOffset: 1000
                        }).addTo(map).bindPopup("You are here");

                        userAccuracyCircle = L.circle(latlng, {
                            radius: radius,
                            className: 'user-accuracy-circle',
                            interactive: false
                        }).addTo(map);

                        map.flyTo(latlng, Math.max(map.getZoom(), 17));
                    } else {
                        userLocationMarker.setLatLng(latlng).setOpacity(1);
                        userAccuracyCircle.setLatLng(latlng).setRadius(radius);
                    }
                },
                (err) => {
                    console.warn("Geolocation error:", err);
                    btn.classList.remove('locating', 'active');
                    showMessage("Could not get location");
                    setTimeout(hideMessage, 3000);
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }

        // ==================== DESIGN PREVIEW BOOTSTRAP ====================
        // Everything below runs only when IS_DESIGN_PREVIEW === true. The parent
        // page (src/pages/MAP.mggqp.js) is expected to skip all postMessage data
        // publishing when the iframe URL has designPreview=1, so this mode is
        // fully self-contained.

        function bootstrapDesignPreview() {
            document.body.classList.add('design-preview');
            if (DESIGN_PREVIEW_PARAMS.devToolbar) {
                document.body.classList.add('design-preview-has-toolbar');
            }
            if (DESIGN_PREVIEW_PARAMS.noWatermark) {
                const badge = document.getElementById('design-preview-watermark');
                if (badge) badge.classList.add('hidden');
            }

            wireDesignPreviewToolbar();

            const dismissBtn = document.getElementById('design-preview-dismiss');
            if (dismissBtn) {
                dismissBtn.addEventListener('click', () => {
                    const badge = document.getElementById('design-preview-watermark');
                    if (badge) badge.classList.add('hidden');
                });
            }

            if (DESIGN_PREVIEW_PARAMS.state === 'loading') {
                showLoader();
                return;
            }

            loadDesignPreviewFixture();
        }

        function loadDesignPreviewFixture() {
            const apply = () => {
                const data = window.__DFM_DESIGN_PREVIEW;
                if (!data) {
                    console.error('[DesignPreview] designPreviewData.js did not expose __DFM_DESIGN_PREVIEW');
                    hideLoader();
                    showMessage('Design preview fixture missing. Run npm run generate-design-preview.');
                    return;
                }

                populateDateDropdown(data.marketDates || []);
                selectedDate = data.defaultDate || (data.marketDates && data.marketDates[0] && data.marketDates[0].value) || '';
                if (selectedDate && dateSelect) dateSelect.value = selectedDate;

                const state = DESIGN_PREVIEW_PARAMS.state;
                if (state === 'error') {
                    hideLoader();
                    showMessage('Unable to load market data. Pull to refresh or try again in a minute.');
                    return;
                }
                if (state === 'offline') {
                    applyDesignPreviewOfflineVeil();
                }

                loadDesignPreviewForDate(selectedDate);

                if (state === 'locdenied') {
                    setTimeout(() => {
                        onLocationErrorFromParent({ code: 1, message: 'Permission denied' });
                    }, 400);
                }
            };

            if (window.__DFM_DESIGN_PREVIEW) {
                apply();
                return;
            }

            const script = document.createElement('script');
            script.src = 'designPreviewData.js';
            script.async = false;
            script.onload = apply;
            script.onerror = () => {
                hideLoader();
                showMessage('Could not load design preview data.');
            };
            document.head.appendChild(script);
        }

        function loadDesignPreviewForDate(dateStr) {
            showLoader();
            const data = window.__DFM_DESIGN_PREVIEW;
            if (!data) {
                hideLoader();
                showMessage('Design preview fixture missing.');
                return;
            }

            allStallLayouts = data.stallLayouts || [];
            allPois = data.pois || [];

            const state = DESIGN_PREVIEW_PARAMS.state;
            if (state === 'empty') {
                vendorsOnDate = [];
            } else if (state === 'longtext') {
                vendorsOnDate = (data.vendorsForDate(dateStr) || []).map((v, i) => {
                    if (i === 0) {
                        return Object.assign({}, v, {
                            description: 'This vendor has an intentionally long description so we can verify that the popup, bottom sheet, and screen reader output all handle 300+ characters of marketing copy without breaking the grid, clipping the image, or pushing the close button off screen on a narrow iPhone SE viewport. Test long text wrapping here.'
                        });
                    }
                    return v;
                });
            } else {
                vendorsOnDate = data.vendorsForDate ? (data.vendorsForDate(dateStr) || []) : [];
            }
            selectedDate = dateStr;

            const testBadge = document.getElementById('test-data-badge');
            if (testBadge) {
                testBadge.classList.remove('visible');
                testBadge.setAttribute('aria-hidden', 'true');
            }

            renderMap();
            hideLoader();
        }

        function applyDesignPreviewOfflineVeil() {
            if (document.getElementById('design-preview-offline-veil')) return;
            const mapWrap = document.querySelector('.map-wrapper');
            if (!mapWrap) return;
            const veil = document.createElement('div');
            veil.id = 'design-preview-offline-veil';
            veil.className = 'design-preview-offline-veil';
            veil.textContent = 'Preview: simulated offline — tiles unreachable';
            mapWrap.appendChild(veil);
        }

        function wireDesignPreviewToolbar() {
            const toolbar = document.getElementById('design-preview-toolbar');
            if (!toolbar) return;
            const buttons = toolbar.querySelectorAll('button[data-dp-state]');
            const syncActive = () => {
                buttons.forEach(b => {
                    if (b.getAttribute('data-dp-state') === DESIGN_PREVIEW_PARAMS.state) {
                        b.classList.add('active');
                    } else {
                        b.classList.remove('active');
                    }
                });
            };
            syncActive();
            buttons.forEach(btn => {
                const btnState = btn.getAttribute('data-dp-state');
                btn.addEventListener('click', () => {
                    DESIGN_PREVIEW_PARAMS.state = btnState;
                    syncActive();
                    switchDesignPreviewState(btnState);
                    // Update the URL without reloading so the state is
                    // bookmarkable when the iframe is opened directly. Safe to
                    // call when embedded (it updates the iframe's URL only).
                    try {
                        const params = new URLSearchParams(window.location.search);
                        if (btnState === 'default') {
                            params.delete('state');
                        } else {
                            params.set('state', btnState);
                        }
                        const qs = params.toString();
                        const newUrl = window.location.pathname + (qs ? '?' + qs : '') + window.location.hash;
                        window.history.replaceState({}, '', newUrl);
                    } catch (e) { /* swallow */ }
                });
            });
        }

        function switchDesignPreviewState(state) {
            hideMessage();
            const veil = document.getElementById('design-preview-offline-veil');
            if (veil) veil.remove();
            hideLoader();

            if (state === 'loading') {
                showLoader();
                return;
            }
            if (state === 'error') {
                showMessage('Unable to load market data. Pull to refresh or try again in a minute.');
                return;
            }
            if (state === 'offline') {
                applyDesignPreviewOfflineVeil();
            }

            loadDesignPreviewForDate(selectedDate || (allMarketDates[0] && allMarketDates[0].value) || '');

            if (state === 'locdenied') {
                setTimeout(() => {
                    onLocationErrorFromParent({ code: 1, message: 'Permission denied' });
                }, 400);
            }
        }
    </script>
</body>
