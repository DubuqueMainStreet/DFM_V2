<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dubuque Farmers' Market Interactive Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="dns-prefetch" href="https://a.tile.openstreetmap.org">
    <!-- Poppins from Google Fonts (local files removed to stay under Wix CLI sync limit) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <style>
        /* ==================== BRAND FONTS (Farmers Market) ==================== */
        /* Primary H1 */
        @font-face {
            font-family: 'TAY Milkbar';
            src: url('fonts/TAYMilkbar.otf') format('opentype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }
        /* Supporting headers */
        @font-face {
            font-family: 'TAY Dreamboat';
            src: url('fonts/TAYDreamboat.otf') format('opentype');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'TAY Dreamboat Thin';
            src: url('fonts/TAYDreamboat-Thin.otf') format('opentype');
            font-weight: 300;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Outdoors Inks';
            src: url('fonts/OutdoorsInks-Regular.otf') format('opentype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Outdoors Inks';
            src: url('fonts/OutdoorsInks-WildMedium.otf') format('opentype');
            font-weight: 600;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Outdoors Inks';
            src: url('fonts/OutdoorsInks-Rough.otf') format('opentype');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }
        /* Poppins: loaded via Google Fonts link above (no local files) */

        /* ==================== DFM BRAND DESIGN SYSTEM ==================== */
        :root {
            /* DFM Brand (from logo) */
            --dfm-gold: #EBAE1E;
            --dfm-gold-light: #FDCB22;
            --dfm-green: #3EB449;
            --dfm-teal: #1E5C4E;
            --dfm-muted: #759287;
            --dfm-black: #1a1a1a;
            --dfm-white: #ffffff;

            /* Semantic mappings */
            --color-primary: var(--dfm-green);
            --color-accent: var(--dfm-gold);
            --color-text: var(--dfm-teal);
            --color-text-muted: var(--dfm-muted);

            /* Legacy aliases (for gradual migration) */
            --forest: var(--dfm-teal);
            --sage: var(--dfm-green);
            --moss: #7a9b6d;
            --mint: #c8dcc0;
            --leaf: var(--dfm-green);
            --cream: #faf8f5;
            --sand: #e8e4dc;
            --clay: var(--dfm-muted);
            --terracotta: #9c6644;
            --soil: #5c4a3d;
            --gold: var(--dfm-gold);
            --rust: #bf5f3f;
            --berry: #8b3a62;
            --white: var(--dfm-white);
            --charcoal: var(--dfm-black);
            --stone: var(--dfm-muted);
            --mist: #f0f0ed;

            /* Shadows */
            --shadow-sm: 0 1px 2px rgba(30, 92, 78, 0.08);
            --shadow-md: 0 4px 12px rgba(30, 92, 78, 0.12);
            --shadow-lg: 0 8px 24px rgba(30, 92, 78, 0.16);
            --shadow-glow: 0 0 20px rgba(62, 180, 73, 0.25);

            /* Typography — Milkbar (H1), Dreamboat / Outdoors Inks (supporting), Poppins (copy) */
            --font-h1: 'TAY Milkbar', Georgia, serif;
            --font-display: 'TAY Dreamboat', 'TAY Milkbar', Georgia, serif;
            --font-display-thin: 'TAY Dreamboat Thin', 'TAY Milkbar', Georgia, serif;
            --font-display-ink: 'Outdoors Inks', 'TAY Dreamboat', Georgia, serif;
            --font-body: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;

            /* Spacing */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;

            /* Borders */
            --radius-sm: 6px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-pill: 50px;
        }

        /* ==================== RESET & BASE ==================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: var(--font-body);
            background: var(--cream);
            color: var(--charcoal);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
            contain: layout style paint;
        }

        /* ==================== LAYOUT ==================== */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* ==================== HEADER / CONTROLS ==================== */
        .controls-panel {
            background: var(--white);
            border-bottom: 1px solid var(--sand);
            box-shadow: var(--shadow-md);
            z-index: 1000;
            padding: var(--space-sm) var(--space-md);
            flex-shrink: 0;
        }

        .controls-header {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            margin-bottom: var(--space-sm);
        }

        .brand-logo {
            height: 36px;
            width: auto;
            object-fit: contain;
            display: none; /* Hide on mobile to save space */
        }

        .brand-logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        @media (min-width: 640px) {
            .brand-logo {
                display: block;
                height: 44px;
            }
        }

        /* Date Selector */
        .date-selector {
            position: relative;
            flex: 0 0 auto;
        }

        .date-select {
            appearance: none;
            background: var(--forest);
            color: var(--white);
            border: none;
            padding: var(--space-sm) var(--space-lg) var(--space-sm) var(--space-md);
            border-radius: var(--radius-pill);
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            min-width: 160px;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        .date-select:hover {
            background: var(--sage);
            box-shadow: var(--shadow-md);
        }

        .date-select:focus {
            outline: none;
            box-shadow: var(--shadow-glow);
        }

        .date-selector::after {
            content: '\f078';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--white);
            font-size: 0.7rem;
            pointer-events: none;
        }

        /* Search Bar */
        .search-container {
            flex: 1;
            max-width: 400px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: var(--space-sm) var(--space-md) var(--space-sm) 40px;
            border: 2.5px solid var(--clay);
            border-radius: var(--radius-pill);
            font-family: var(--font-body);
            font-size: 0.9rem;
            background: var(--mist);
            transition: all 0.2s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--sage);
            background: var(--white);
            box-shadow: var(--shadow-glow);
        }

        .search-input::placeholder {
            color: var(--stone);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--stone);
            font-size: 0.9rem;
        }

        .search-clear {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--stone);
            color: var(--white);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 0.85rem;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .search-container.has-value .search-clear {
            opacity: 1;
        }

        /* ==================== FILTER BUTTONS ==================== */
        .filters-scroll {
            position: relative;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            margin: 0 calc(-1 * var(--space-md));
            padding: var(--space-xs) var(--space-md);
            scroll-snap-type: x mandatory;
        }

        .filters-scroll::before,
        .filters-scroll::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 32px;
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .filters-scroll::before {
            left: 0;
            background: linear-gradient(to left, transparent, var(--white));
        }

        .filters-scroll::after {
            right: 0;
            background: linear-gradient(to right, transparent, var(--white));
        }

        .filters-scroll.scrolled-left::before {
            opacity: 1;
        }

        .filters-scroll.scrolled-right::after {
            opacity: 1;
        }

        .filters-scroll::-webkit-scrollbar {
            display: none;
        }

        .filters-grid {
            display: flex;
            gap: var(--space-sm);
            width: max-content;
        }

        .filter-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            min-height: 44px;
            background: var(--white);
            border: 2px solid var(--clay);
            border-radius: var(--radius-pill);
            font-family: var(--font-body);
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--charcoal);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            -webkit-user-select: none;
            scroll-snap-align: start;
            scroll-snap-stop: always;
        }

        .filter-btn:hover {
            background: var(--mist);
            border-color: var(--sage);
            transform: translateY(-1px);
        }

        .filter-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .filter-btn.active {
            background: var(--forest);
            border-color: var(--forest);
            color: var(--white);
            box-shadow: var(--shadow-md);
        }

        .filter-btn i {
            font-size: 0.9rem;
        }

        /* Category-specific colors for active state */
        .filter-btn[data-category="food"].active { background: var(--terracotta); border-color: var(--terracotta); }
        .filter-btn[data-category="produce"].active { background: var(--leaf); border-color: var(--leaf); }
        .filter-btn[data-category="artisan"].active { background: var(--berry); border-color: var(--berry); }
        .filter-btn[data-category="poi"].active { background: var(--sage); border-color: var(--sage); }
        .filter-btn[data-category="utility"].active { background: var(--clay); border-color: var(--clay); }

        /* Clear All Button */
        .clear-all-btn {
            background: transparent;
            border: 2px dashed var(--stone);
            color: var(--stone);
            padding: 8px 16px;
        }

        .clear-all-btn:hover {
            background: var(--mist);
            border-style: solid;
            border-color: var(--rust);
            color: var(--rust);
        }

        /* ==================== MAP CONTAINER ==================== */
        .map-wrapper {
            flex: 1;
            position: relative;
            min-height: 0;
        }

        #map {
            height: 100%;
            width: 100%;
            background: var(--cream);
            z-index: 1;
            contain: layout style paint;
        }

        /* ==================== LOADING OVERLAY ==================== */
        .map-loader {
            position: absolute;
            inset: 0;
            background: rgba(250, 248, 245, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: opacity 0.3s ease;
        }

        .map-loader.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--sand);
            border-top-color: var(--dfm-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: var(--space-md);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            font-weight: 500;
            color: var(--charcoal);
        }

        /* ==================== INFO MESSAGE ==================== */
        .map-message {
            position: absolute;
            top: var(--space-md);
            left: 50%;
            transform: translateX(-50%);
            background: var(--dfm-teal);
            color: var(--dfm-white);
            padding: var(--space-sm) var(--space-lg);
            border-radius: var(--radius-pill);
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            z-index: 1001;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .map-message.visible {
            opacity: 1;
        }

        .map-message .msg-clear-filters {
            display: inline-block;
            margin-left: 6px;
            padding: 2px 10px;
            background: rgba(255,255,255,0.25);
            color: inherit;
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }

        .map-message .msg-clear-filters:hover {
            background: rgba(255,255,255,0.35);
        }

        /* ==================== MAP CONTROL BUTTONS ==================== */
        .fit-market-btn,
        .locate-btn {
            position: absolute;
            bottom: var(--space-lg);
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--white);
            border: none;
            box-shadow: var(--shadow-lg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: all 0.2s ease;
        }

        .fit-market-btn {
            right: calc(var(--space-md) + 58px);
        }

        .fit-market-btn:hover {
            background: var(--mist);
            transform: scale(1.05);
        }

        .fit-market-btn i {
            font-size: 1.15rem;
            color: var(--charcoal);
        }

        .locate-btn {
            right: var(--space-md);
        }

        .locate-btn:hover {
            background: var(--mist);
            transform: scale(1.05);
        }

        .locate-btn:active {
            transform: scale(0.95);
        }

        .locate-btn i {
            font-size: 1.2rem;
            color: var(--charcoal);
        }

        .locate-btn.locating i {
            color: var(--sage);
            animation: pulse 1.5s infinite;
        }

        .locate-btn.active {
            background: var(--forest);
        }

        .locate-btn.active i {
            color: var(--white);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ==================== VENDOR COUNT BADGE ==================== */
        .vendor-count {
            position: absolute;
            bottom: var(--space-lg);
            left: var(--space-md);
            background: var(--white);
            padding: var(--space-sm) var(--space-md);
            border-radius: var(--radius-md);
            border: 1px solid var(--sand);
            box-shadow: var(--shadow-md);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--charcoal);
            z-index: 1000;
        }

        .vendor-count span {
            color: var(--dfm-green);
        }

        .test-data-badge {
            position: absolute;
            top: var(--space-md);
            right: var(--space-md);
            background: var(--dfm-gold);
            color: var(--dfm-black);
            padding: var(--space-xs) var(--space-sm);
            border-radius: var(--radius-sm);
            font-size: 0.7rem;
            font-weight: 600;
            z-index: 1000;
            display: none;
        }

        .test-data-badge.visible {
            display: block;
        }

        /* ==================== SKELETON LOADING ==================== */
        .skeleton {
            background: linear-gradient(
                90deg,
                var(--sand) 25%,
                var(--mist) 50%,
                var(--sand) 75%
            );
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
            border-radius: var(--radius-sm);
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-btn {
            width: 100px;
            height: 36px;
            border-radius: var(--radius-pill);
        }

        /* ==================== LEAFLET OVERRIDES ==================== */
        .leaflet-control-zoom {
            border: none !important;
            box-shadow: var(--shadow-md) !important;
            border-radius: var(--radius-md) !important;
            overflow: hidden;
        }

        .leaflet-control-zoom a {
            background: var(--white) !important;
            color: var(--charcoal) !important;
            border: none !important;
            width: 44px !important;
            height: 44px !important;
            line-height: 44px !important;
            font-size: 1.2rem !important;
        }

        .leaflet-control-zoom a:hover {
            background: var(--mist) !important;
        }

        /* Custom Popup Styling */
        .leaflet-popup-content-wrapper {
            background: var(--white);
            border-radius: var(--radius-md);
            box-shadow: 0 8px 30px rgba(0,0,0,0.18);
            padding: 0;
            overflow: hidden;
        }

        .leaflet-popup-content {
            margin: 0;
            min-width: 280px;
            max-width: 340px;
            line-height: 1.5;
        }

        .leaflet-popup-tip {
            background: var(--white);
            box-shadow: none;
        }

        .leaflet-popup-close-button {
            color: rgba(255,255,255,0.85) !important;
            font-size: 22px !important;
            width: 30px !important;
            height: 30px !important;
            line-height: 30px !important;
            padding: 0 !important;
            right: 8px !important;
            top: 8px !important;
            z-index: 10;
            border-radius: 50%;
            background: rgba(0,0,0,0.15) !important;
            transition: background 0.15s ease;
        }

        .leaflet-popup-close-button:hover {
            background: rgba(0,0,0,0.25) !important;
        }

        .popup-header {
            background: var(--forest);
            color: var(--white);
            padding: 14px 16px 12px;
        }

        .popup-title {
            font-family: var(--font-body);
            font-size: 1.05rem;
            font-weight: 600;
            line-height: 1.3;
            letter-spacing: 0.01em;
            margin-bottom: 4px;
            padding-right: 24px;
        }

        .popup-subtitle {
            font-family: var(--font-body);
            font-size: 0.8rem;
            font-weight: 400;
            opacity: 1;
            letter-spacing: 0.01em;
        }

        .popup-body {
            padding: 12px 16px;
            font-family: var(--font-body);
        }

        .popup-body:empty {
            display: none;
        }

        .popup-description {
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--charcoal);
            line-height: 1.6;
            margin-bottom: var(--space-sm);
        }

        .popup-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .popup-tag {
            font-family: var(--font-body);
            background: var(--mist);
            color: var(--charcoal);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.78rem;
            font-weight: 500;
            border-left: 3px solid var(--tag-accent, var(--stone));
        }

        .popup-actions {
            display: flex;
            gap: var(--space-sm);
            padding: 12px 16px 14px;
            border-top: 1px solid var(--sand);
        }

        .popup-btn {
            flex: 1;
            padding: 10px 14px;
            min-height: 44px;
            border-radius: var(--radius-sm);
            font-family: var(--font-body);
            font-size: 0.8125rem;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .popup-btn-primary,
        .popup-btn-primary:link,
        .popup-btn-primary:visited,
        .popup-btn-primary:hover,
        .popup-btn-primary:focus {
            background: var(--forest);
            color: var(--white) !important;
            border: none;
            font-weight: 700;
        }

        .popup-btn-primary:hover,
        .popup-btn-primary:focus {
            background: var(--sage);
        }

        .popup-btn-secondary {
            background: var(--mist);
            color: var(--charcoal);
            border: 1px solid var(--sand);
            border-left: 3px solid var(--stone);
        }

        .popup-btn-secondary:hover {
            background: var(--sand);
        }

        .popup-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            margin-top: var(--space-sm);
            padding-top: var(--space-sm);
            border-top: 1px solid var(--sand);
        }

        .popup-nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            font-family: var(--font-body);
            font-size: 0.8rem;
            color: var(--forest);
            background: transparent;
            border: 1px solid var(--sand);
            border-radius: var(--radius-sm);
            cursor: pointer;
        }

        .popup-nav-btn:hover {
            background: var(--mist);
        }

        .popup-nav-count {
            font-family: var(--font-body);
            font-size: 0.8rem;
            color: var(--charcoal-muted);
        }

        .filter-btn:focus-visible,
        .date-select:focus-visible,
        .search-input:focus-visible,
        .popup-btn:focus-visible,
        .locate-btn:focus-visible,
        .fit-market-btn:focus-visible,
        .popup-nav-btn:focus-visible,
        .search-clear:focus-visible {
            outline: 3px solid var(--dfm-gold);
            outline-offset: 2px;
        }

        .active-filter-chip {
            display: none;
            position: absolute;
            top: var(--space-sm);
            left: 50%;
            transform: translateX(-50%);
            background: var(--forest);
            color: var(--white);
            padding: 6px 14px 6px 12px;
            border-radius: var(--radius-pill);
            font-family: var(--font-body);
            font-size: 0.8rem;
            font-weight: 600;
            z-index: 1001;
            box-shadow: var(--shadow-md);
            gap: 8px;
            align-items: center;

        }

        .active-filter-chip.visible {

        }

        .active-filter-chip button {
            background: rgba(255,255,255,0.25);

            height: 22px;

            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 4px;

        .legend-btn {

            left: var(--space-md);

            height: 44px;

            border: none;
            box-shadow: var(--shadow-lg);

            align-items: center;
            justify-content: center;
            z-index: 1000;

        .legend-overlay {

            align-items: center;

            width: 14px;
            height: 14px;

        /* ==================== MARKER STYLES ==================== */
        /* Reset Leaflet divIcon wrapper — eliminate default background/border */
        .leaflet-marker-icon.vendor-marker,

            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
        }

        .vendor-marker {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .vendor-marker .marker-pin {
            border-radius: 50%;
            border: 2.5px solid var(--white);
            box-shadow: 0 0 0 1px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            will-change: transform;
        }

        .vendor-marker .marker-pin:hover {
            transform: scale(1.12);
        }

        .vendor-marker .marker-pin i {
            color: var(--white);
        }

        .vendor-marker.highlighted .marker-pin {
            transform: scale(1.2);
            box-shadow: 0 0 0 4px rgba(62, 180, 73, 0.3), 0 2px 8px rgba(0,0,0,0.3);
        }

        .vendor-marker.dimmed .marker-pin {
            opacity: 0.35;

        .empty-stall-marker .marker-pin {

        /* User Location */

            height: 16px;
            background: #2196F3;

        @media (max-width: 480px) {

            .controls-header {
                gap: var(--space-sm);

            .date-select {
                min-width: 130px;
                font-size: 0.85rem;

            .search-input {

                padding: 6px var(--space-md) 6px 36px;

            .filter-btn {
                padding: 10px 14px;
                min-height: 44px;
                font-size: 0.75rem;
            }

            .filters-grid {
                gap: 6px;
            }

            .vendor-count {
                bottom: var(--space-md);
                left: var(--space-sm);
                font-size: 0.85rem;
            }

            .fit-market-btn,
            .locate-btn {
                width: 46px;
                height: 46px;
                bottom: var(--space-md);
            }

            .fit-market-btn {
                right: calc(var(--space-sm) + 52px);
            }

            .locate-btn {
                right: var(--space-sm);
            }

            .leaflet-popup-content {
                min-width: 260px;
                max-width: 300px;
            }

            .popup-title {
                font-size: 0.95rem;
            }

            .popup-btn {
                font-size: 0.8rem;
                padding: 10px 10px;
                min-height: 44px;
            }

            .legend-btn {
                bottom: calc(var(--space-md) + 96px);
                left: var(--space-sm);
                width: 40px;
                height: 40px;
            }

            .legend-overlay {
                bottom: calc(var(--space-md) + 140px);
                left: var(--space-sm);
                max-height: 50vh;
                overflow-y: auto;
            }

            .map-message {
                top: var(--space-lg);
            }
        }

        /* ==================== DESIGN PREVIEW MODE (?designPreview=1) ==================== */
        /* Everything in this block only renders when JS adds the .design-preview
           class to <body>. Hard-gated so nothing here can leak to real visitors. */
        .design-preview-watermark {
            position: fixed;
            bottom: 14px;
            right: 14px;
            z-index: 2500;
            display: none;
            align-items: center;
            gap: 8px;
            padding: 6px 10px 6px 12px;
            background: var(--dfm-gold);

        body.design-preview .design-preview-watermark {
            display: inline-flex;
        }
        .design-preview-watermark i {
            font-size: 0.85rem;
        }
        .design-preview-watermark button {
            background: rgba(0, 0, 0, 0.15);
            border: none;
            color: inherit;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 0.65rem;
            cursor: pointer;

        }
        .design-preview-watermark button:hover {
            background: rgba(0, 0, 0, 0.28);
        }
        .design-preview-watermark.hidden {
            display: none !important;

        .design-preview-toolbar {
            position: fixed;

            gap: 4px;

            font-family: var(--font-body);

        body.design-preview.design-preview-has-toolbar .design-preview-toolbar {

        .design-preview-toolbar .dp-tb-label {
            align-self: center;

        .design-preview-toolbar button {

        .design-preview-toolbar button.active {
            background: var(--dfm-gold);
            color: var(--dfm-black);
            border-color: var(--dfm-gold);
            font-weight: 700;
        }
        .design-preview-toolbar button:focus-visible {
            outline: 3px solid var(--dfm-gold);
            outline-offset: 2px;
        }

        /* Simulated tile-unreachable dim layer for &state=offline. */
        .design-preview-offline-veil {
            position: absolute;
            inset: 0;
            z-index: 450;
            background: repeating-linear-gradient(
                45deg,
                rgba(117, 146, 135, 0.25),
                rgba(117, 146, 135, 0.25) 14px,
                rgba(117, 146, 135, 0.35) 14px,
                rgba(117, 146, 135, 0.35) 28px
            );
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--dfm-teal);
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Controls Panel -->
        <div class="controls-panel">
            <div class="controls-header">
                <a href="/" class="brand-logo-link" aria-label="Dubuque Farmers' Market home">
                    <img src="https://static.wixstatic.com/media/f27fe6_5f9fa55638b04d90a32b4397229fdae2~mv2.png" alt="Dubuque Farmers' Market" class="brand-logo">
                </a>
                
                <div class="date-selector">
                    <select id="date-select" class="date-select" aria-label="Select market date">
                        <option value="">Loading dates...</option>
                    </select>
                </div>

                <div class="search-container" id="search-container">
                    <i class="fa-solid fa-magnifying-glass search-icon" aria-hidden="true"></i>
                    <input type="text" class="search-input" id="search-input" placeholder="Search vendors..." aria-label="Search vendors by name or product" enterkeyhint="search">
                    <button class="search-clear" id="search-clear" aria-label="Clear search"><i class="fa-solid fa-xmark" aria-hidden="true"></i></button>
                </div>
            </div>

            <div class="filters-scroll">
                <div class="filters-grid" id="filters-grid">
                    <!-- Vendor Type Filters -->
                    <button class="filter-btn" data-type="vendorType" data-value="On-site Prepared Food Vendor" data-category="food">
                        <i class="fa-solid fa-utensils"></i> Ready to Eat
                    </button>
                    <button class="filter-btn" data-type="vendorType" data-value="Grower/Producer/Processor" data-category="produce">
                        <i class="fa-solid fa-carrot"></i> Farm Fresh
                    </button>
                    <button class="filter-btn" data-type="keyword" data-value="bakery bread cookie pie cake sweet pastry" data-category="food">
                        <i class="fa-solid fa-cake-candles"></i> Baked Goods
                    </button>
                    <button class="filter-btn" data-type="keyword" data-value="coffee espresso latte tea chai" data-category="food">
                        <i class="fa-solid fa-mug-saucer"></i> Coffee & Tea
                    </button>
                    <button class="filter-btn" data-type="keyword" data-value="snap ebt dufb double up food bucks" data-category="utility">
                        <i class="fa-solid fa-credit-card"></i> SNAP/EBT
                    </button>
                    
                    <!-- POI Filters -->
                    <button class="filter-btn" data-type="poiType" data-value="Information" data-category="poi">
                        <i class="fa-solid fa-circle-info"></i> Info
                    </button>
                    <button class="filter-btn" data-type="poiType" data-value="Restroom" data-category="poi">
                        <i class="fa-solid fa-restroom"></i> Restrooms
                    </button>
                    <button class="filter-btn" data-type="poiType" data-value="SeatingArea" data-category="poi">
                        <i class="fa-solid fa-chair"></i> Seating
                    </button>
                    <button class="filter-btn" data-type="poiType" data-value="PublicParkingArea" data-category="utility">
                        <i class="fa-solid fa-square-parking"></i> Parking
                    </button>
                    <button class="filter-btn" data-type="poiType" data-value="Market Tokens" data-category="utility">
                        <i class="fa-solid fa-coins"></i> Tokens
                    </button>
                    
                    <!-- Clear All -->
                    <button class="filter-btn clear-all-btn" id="clear-all-btn">
                        <i class="fa-solid fa-rotate-left"></i> Clear
                    </button>
                </div>
            </div>
        </div>

        <!-- Map -->
        <div class="map-wrapper">
            <div id="map" role="application" aria-label="Dubuque Farmers Market interactive map"></div>
            
            <!-- Loading Overlay -->
            <div class="map-loader" id="map-loader">
                <div class="loader-spinner"></div>
                <span class="loader-text">Loading market map...</span>
            </div>

            <!-- Info Message -->
            <div class="map-message" id="map-message"></div>

            <!-- Active Filter Chip -->
            <div class="active-filter-chip" id="active-filter-chip">
                <span id="active-filter-label"></span>

            </div>

            <!-- Vendor Count -->

            <!-- Legend -->

            </button>
            <div class="legend-overlay" id="legend-overlay" role="complementary" aria-label="Map legend">

                <div class="legend-item"><div class="legend-dot" style="background:#7a9b6d"></div> Occasional Vendors</div>
                <div class="legend-item"><div class="legend-dot" style="background:#759287"></div> Points of Interest</div>
                <div class="legend-item" style="margin-top:8px;font-weight:600">Icon categories (auto-matched)</div>
                <div class="legend-item"><i class="fa-solid fa-carrot" aria-hidden="true"></i> Produce / Farm Goods</div>
                <div class="legend-item"><i class="fa-solid fa-bread-slice" aria-hidden="true"></i> Bakery / Pantry</div>
                <div class="legend-item"><i class="fa-solid fa-utensils" aria-hidden="true"></i> Prepared Food</div>

    <!-- Design preview watermark + dev toolbar. Hard-gated: only rendered when
         JS detects ?designPreview=1 and adds the .design-preview class to <body>. -->
    <div class="design-preview-watermark" id="design-preview-watermark" role="status" aria-live="polite">
        <i class="fa-solid fa-palette" aria-hidden="true"></i>
        <span>Design preview</span>

        <button type="button" data-dp-state="loading">loading</button>
        <button type="button" data-dp-state="empty">empty</button>
        <button type="button" data-dp-state="error">error</button>
        <button type="button" data-dp-state="offline">offline</button>
        <button type="button" data-dp-state="locdenied">loc denied</button>
        <button type="button" data-dp-state="longtext">long text</button>

    <script>
        // ==================== DESIGN PREVIEW GATE ====================
        // Activated ONLY when the iframe URL contains ?designPreview=1.
        // When active, the iframe ignores postMessage data from the parent and
        // renders a curated fixture from src/public/designPreviewData.js.
        // Optional query params:
        //   &state=default|loading|empty|error|offline|locdenied|longtext
        //   &devtoolbar=1   (shows the state-switcher toolbar)
        //   &nowatermark=1  (hides the "Design preview" badge)
        const DESIGN_PREVIEW_PARAMS = (() => {
            try {
                const params = new URLSearchParams(window.location.search);
                const enabled = params.get('designPreview') === '1';
                const state = (params.get('state') || 'default').toLowerCase();
                const devToolbar = params.get('devtoolbar') === '1' || enabled;
                const noWatermark = params.get('nowatermark') === '1';
                return { enabled, state, devToolbar, noWatermark };
            } catch (e) {
                return { enabled: false, state: 'default', devToolbar: false, noWatermark: false };
            }
        })();
        // Mutable because the parent page (MAP.mggqp.js) can also flip this on
        // via an `enableDesignPreview` postMessage when the parent URL has
        // ?designPreview=1 — the iframe's own URL doesn't inherit parent query
        // params in Wix, so we support both activation paths.
        let IS_DESIGN_PREVIEW = DESIGN_PREVIEW_PARAMS.enabled;

        // ==================== CONFIGURATION ====================
        const VENDOR_TYPE_COLORS = {
            "Grower/Producer/Processor": "#3EB449",
            "On-site Prepared Food Vendor": "#EBAE1E",
            "Crafter/Artisan": "#1E5C4E",
            "Occasional Vendor": "#7a9b6d",
            "Default": "#759287"
        };

        const VENDOR_TYPE_FALLBACK_ICONS = {
            "Grower/Producer/Processor": "fa-leaf",
            "On-site Prepared Food Vendor": "fa-utensils",
            "Crafter/Artisan": "fa-paintbrush",
            "Occasional Vendor": "fa-store"
        };

        const VENDOR_ICON_RULES = [
            // Produce and growing
            { keywords: ["flower", "bouquet", "floral", "arrangement"], faClass: "fa-spa", priority: 60 },
            { keywords: ["lavender", "wildflower", "sunflower"], faClass: "fa-spa", priority: 58 },
            { keywords: ["mushroom", "fungi", "morel", "shiitake", "oyster mushroom"], faClass: "fa-cloud-meatball", priority: 56 },
            { keywords: ["microgreen", "microgreens", "sprout", "sprouts"], faClass: "fa-seedling", priority: 55 },
            { keywords: ["herb", "herbs", "basil", "cilantro", "mint", "rosemary", "thyme"], faClass: "fa-seedling", priority: 54 },

            { keywords: ["corn", "potato", "onion", "garlic", "cucumber", "asparagus", "pumpkin", "gourd"], faClass: "fa-carrot", priority: 43 },
            { keywords: ["fruit", "fruits", "berry", "berries", "apple", "peach", "plum", "melon"], faClass: "fa-apple-whole", priority: 44 },
            { keywords: ["strawberry", "blueberry", "raspberry", "blackberry", "grape", "cherry", "pear", "watermelon"], faClass: "fa-apple-whole", priority: 45 },
            { keywords: ["orchard", "citrus"], faClass: "fa-apple-whole", priority: 44 },

            // Proteins and dairy
            { keywords: ["egg", "eggs", "breakfast"], faClass: "fa-egg", priority: 57 },
            { keywords: ["beef", "steak", "cow", "cattle", "bison", "buffalo"], faClass: "fa-cow", priority: 52 },
            { keywords: ["pork", "bacon", "ham", "sausage", "brat", "brats"], faClass: "fa-bacon", priority: 52 },

            { keywords: ["protein"], faClass: "fa-drumstick-bite", priority: 35 },

            // Baked goods and sweets
            { keywords: ["donut", "doughnut"], faClass: "fa-stroopwafel", priority: 58 },
            { keywords: ["pastry", "croissant", "danish", "scone"], faClass: "fa-stroopwafel", priority: 56 },
            { keywords: ["pie", "pies", "cobbler"], faClass: "fa-chart-pie", priority: 57 },
            { keywords: ["cookie", "cookies", "biscuit", "biscuits"], faClass: "fa-cookie-bite", priority: 57 },
            { keywords: ["cake", "cupcake", "cupcakes"], faClass: "fa-cake-candles", priority: 56 },
            { keywords: ["bread", "roll", "rolls", "baguette", "sourdough", "loaf", "bagel"], faClass: "fa-bread-slice", priority: 53 },
            { keywords: ["bakery", "baked goods", "pastries"], faClass: "fa-cake-candles", priority: 46 },

            { keywords: ["brownie", "brownies"], faClass: "fa-cookie-bite", priority: 54 },

            // Beverages
            { keywords: ["coffee", "espresso", "latte", "cappuccino", "americano"], faClass: "fa-mug-saucer", priority: 57 },
            { keywords: ["tea", "chai", "herbal tea", "matcha"], faClass: "fa-leaf", priority: 53 },
            { keywords: ["kombucha", "fermented drink"], faClass: "fa-wine-bottle", priority: 53 },
            { keywords: ["cider", "wine", "mead", "spirits"], faClass: "fa-wine-bottle", priority: 52 },
            { keywords: ["lemonade", "juice", "smoothie"], faClass: "fa-glass-water", priority: 49 },

            { keywords: ["soda", "sparkling"], faClass: "fa-glass-water", priority: 45 },

        function initMap() {

            // Restore last view or use default

            try {

                    zoom = view.zoom;
                }

                preferCanvas: true,
                zoomControl: false
            }).setView(center, zoom);

            map.on('moveend zoomend', () => {
                clearTimeout(saveViewTimeout);
                saveViewTimeout = setTimeout(() => {
                    try {
                        const c = map.getCenter();
                        localStorage.setItem('dfm_map_view', JSON.stringify({
                            lat: c.lat, lng: c.lng, zoom: map.getZoom()
                        }));
                    } catch (e) {}
                }, 500);

            // another flyTo after filter-driven fly, producing jitter. Marker highlight/dim does not depend on zoom.
            // map.on('zoomend', updateMarkerStyles);

            map.on('popupopen', (e) => {
                const el = e.popup.getElement();
                const header = el && el.querySelector('.popup-header');
                const closeBtn = el && el.querySelector('.leaflet-popup-close-button');
                if (header && closeBtn) {
                    const bgColor = header.getAttribute('data-header-color') || header.style.backgroundColor || header.style.background || '';
                    const closeColor = getContrastTextColor(bgColor);
                    closeBtn.style.setProperty('color', closeColor, 'important');
                }
                const nav = el && el.querySelector('.popup-nav');
                if (!nav) return;
                const source = e.popup.getSource();
                const idx = vendorPopupOrder.findIndex(entry => entry.marker === source);

                nav.innerHTML = navHtml;
                nav.querySelector('.popup-prev')?.addEventListener('click', () => {
                    map.closePopup();
                    vendorPopupOrder[idx - 1].marker.openPopup();

        // postMessage origin hardening. Wix hosts iframes under several
        // domains (site origin, editor, preview), so we allowlist via
        // pattern match rather than a single literal. The first valid
        // inbound message captures the parent origin; subsequent
        // outbound messages use it instead of "*".
        const ALLOWED_PARENT_ORIGIN_PATTERNS = [
            /^https:\/\/(www\.)?dubuquefarmersmarket\.org$/i,
            /^https:\/\/[^/]*\.wixsite\.com$/i,
            /^https:\/\/[^/]*\.filesusr\.com$/i,
            /^https:\/\/[^/]*\.wix\.com$/i,
            /^https:\/\/editor\.wix\.com$/i,
            /^https:\/\/[^/]*\.editorx\.com$/i
        ];
        function isAllowedOrigin(origin) {
            if (!origin || origin === 'null') return false;
            return ALLOWED_PARENT_ORIGIN_PATTERNS.some(re => re.test(origin));
        }
        let capturedParentOrigin = null;
        function sendToParent(message) {
            if (!window.parent || window.parent === window) return;
            // First message (iframeReady) must use "*" because we have not
            // yet received anything from the parent to learn its origin.
            const target = capturedParentOrigin || "*";
            try { window.parent.postMessage(message, target); } catch (e) { /* swallow */ }
        }

        function sendReadyMessage() {
            if (IS_DESIGN_PREVIEW) {
                bootstrapDesignPreview();
                return;
            }
            sendToParent({ type: "iframeReady" });
        }

        // ==================== MESSAGE HANDLING ====================
        window.addEventListener("message", (event) => {
            if (!event.data || !event.data.type) return;
            if (!isAllowedOrigin(event.origin)) {
                // Silently drop messages from unexpected origins.
                return;
            }
            if (!capturedParentOrigin) capturedParentOrigin = event.origin;

            const { type, payload } = event.data;

            switch (type) {
                case "enableDesignPreview":
                    if (!IS_DESIGN_PREVIEW) {
                        IS_DESIGN_PREVIEW = true;
                        if (payload && typeof payload.state === 'string') {
                            DESIGN_PREVIEW_PARAMS.state = payload.state.toLowerCase();
                        }
                        DESIGN_PREVIEW_PARAMS.devToolbar = (payload && payload.devToolbar) || DESIGN_PREVIEW_PARAMS.devToolbar;
                        bootstrapDesignPreview();
                    }
                    break;
                case "mapLoading":
                    if (IS_DESIGN_PREVIEW) break;
                    showLoader();
                    break;
                case "setMarketDates":
                    if (IS_DESIGN_PREVIEW) break;
                    populateDateDropdown(payload.dates);
                    break;
                case "loadMapData":
                    if (IS_DESIGN_PREVIEW) break;
                    showLoader();
                    allStallLayouts = payload.allStallLayouts || [];

                    vendorsOnDate = payload.vendorsOnDate || [];

                case "mapDataError":

                    setTimeout(hideMessage, 5000);
                    break;
                case "locationResult":
                    applyLocationFromParent(payload);
                    break;
